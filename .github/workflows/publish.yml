name: Publish Daily Fashion Report

on:
  schedule:
    # 11:00 UTC daily ≈ 7:00 AM Eastern. Adjust the cron below to retime.
    # minute hour day-of-month month day-of-week  (https://crontab.guru)
    - cron: '0 11 * * *'

  # "Run workflow" button in the Actions tab — use this to trigger a run manually.
  workflow_dispatch:

permissions:
  contents: write   # needed to commit and push the generated edition

concurrency:
  group: publish
  cancel-in-progress: false

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: scripts/requirements.txt

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Generate today's edition
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate.py

      - name: Commit and push new edition
        run: |
          git config user.name  "Red Cars NY Bot"
          git config user.email "bot@redcarsny.local"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Daily fashion report: $(date -u +'%Y-%m-%d')"
            git push
          fi
